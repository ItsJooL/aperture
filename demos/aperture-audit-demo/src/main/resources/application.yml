elide:
  json-api:
    path: /api/
    enabled: true
  graphql:
    path: /graphql
    enabled: false
  api-versioning-strategy:
    path:
      enabled: true

spring:
  application:
    name: aperture-audit-demo
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/aperture}
    username: ${DB_USER:aperture}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

aperture:
  profile: ${APERTURE_PROFILE:demo}
  audit:
    webhook:
      url: ${APERTURE_AUDIT_WEBHOOK_URL:http://localhost:8282/siem/audit}
      batch-size: ${APERTURE_AUDIT_WEBHOOK_BATCH_SIZE:5}
      flush-interval: ${APERTURE_AUDIT_WEBHOOK_FLUSH_INTERVAL:PT1S}
  auth:
    refresh-duration: ${APERTURE_REFRESH_DURATION:PT720H}
    jwt:
      secret: ${APERTURE_JWT_SECRET:audit-demo-jwt-secret-change-me-32b}
      issuer: ${APERTURE_JWT_ISSUER:aperture-audit-demo}
      audience: ${APERTURE_JWT_AUDIENCE:aperture-audit-demo-api}
      access-duration: ${APERTURE_JWT_ACCESS_DURATION:PT15M}
  encryption:
    local:
      key: ${APERTURE_ENCRYPTION_KEY:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}
