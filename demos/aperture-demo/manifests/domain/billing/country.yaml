apiVersion: aperture.itsjool.com/v1
kind: Entity
metadata:
  name: Country
spec:
  description: "A country reference used for region-based policies"
  plural: Countries
  tenantScoped: false
  fields:
    code:
      type: string
      unique: true
      description: "ISO 3166-1 alpha-2 country code"
    name:
      type: string
      unique: true
      description: "Full country name"
  permissions:
    Accountant: [read]
    Viewer: [read]
  hooks:
    AuditCountry:
      type: guard
      on: [create]
      url: http://hook-service:8080/hooks/audit-country
