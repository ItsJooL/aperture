apiVersion: aperture.itsjool.com/v1
kind: Entity
metadata:
  name: Currency
spec:
  description: "A currency used for pricing products"
  plural: Currencies
  tenantScoped: false
  fields:
    code:
      type: string
      description: "ISO 4217 currency code (e.g. USD, EUR)"
  permissions:
    Accountant: [read]
    Viewer: [read]
  hooks:
    SyncCurrency:
      phase: POSTCOMMIT
      async: true
      onFailure: warn
      url: http://hook-service:8080/hooks/sync-currency
