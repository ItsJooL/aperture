apiVersion: aperture.itsjool.com/v1
kind: Entity
metadata:
  name: Invoice
spec:
  description: "A billing invoice linking a customer to line items and payments"
  tenantScoped: true
  fields:
    amount:
      type: decimal
      required: true
      description: "Total invoice amount"
    customer:
      type: ref
      target: Customer
      relation: ManyToOne
      required: true
      description: "Customer this invoice belongs to"
    status:
      type: string
      enum: [DRAFT, ISSUED, PAID]
      description: "Current lifecycle status of the invoice"
    payments:
      type: ref
      target: Payment
      relation: OneToMany
      mappedBy: invoice
      description: "Payments applied to this invoice"
    lineItems:
      type: ref
      target: LineItem
      relation: OneToMany
      mappedBy: invoice
      description: "Line items that make up this invoice"
  permissions:
    Accountant: [create, read, update]
    Viewer: [read]
  policies:
    FinanceTeamOnly: [read, update]
    EuRegionOnly: [read, update]
  hooks:
    ValidateInvoice:
      phase: PRECOMMIT
      async: false
      onFailure: reject
      url: http://hook-service:8080/hooks/validate-invoice
