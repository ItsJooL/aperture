apiVersion: aperture.itsjool.com/v1
kind: Entity
metadata:
  name: Invoice
spec:
  description: "A billing invoice linking a customer to line items and payments"
  tenantScoped: true
  fields:
    amount:
      type: decimal
      required: true
      description: "Total invoice amount"
    customer:
      type: ref
      target: Customer
      relation: ManyToOne
      required: true
      description: "Customer this invoice belongs to"
    status:
      type: string
      enum: [DRAFT, ISSUED, PAID]
      description: "Current lifecycle status of the invoice"
    payments:
      type: ref
      target: Payment
      relation: OneToMany
      mappedBy: invoice
      description: "Payments applied to this invoice"
    lineItems:
      type: ref
      target: LineItem
      relation: OneToMany
      mappedBy: invoice
      description: "Line items that make up this invoice"
  permissions:
    Accountant: [create, read, update]
    Viewer: [read]
  policies:
    FinanceTeamOnly: [read, update]
    EuRegionOnly: [read, update]
  hooks:
    ValidateInvoice:
      type: validate
      on: [create, update]
      url: http://hook-service:8080/hooks/validate-invoice
      # Opt-in retry (plan 032): rides out a transient blip in hook-service without failing the
      # write. 2 is validate's cap — see docs/guide/hooks.md#retries-and-timeouts for the backoff
      # formula and the ~16.5s worst-case latency this adds if the hook is ever consistently down.
      retries: 2
