apiVersion: aperture.itsjool.com/v1
kind: Entity
metadata:
  name: Product
spec:
  description: "A product or service offered by the tenant"
  tenantScoped: true
  softDelete: true
  optimisticLocking: true
  fields:
    name:
      type: string
      required: true
      unique: true
      description: "Product name"
    sku:
      type: string
      required: true
      unique: true
      description: "Stock-keeping unit code"
    description:
      type: string
      description: "Detailed product description"
    unit_price:
      type: decimal
      required: true
      renamedFrom: unitPrice
      description: "Unit price of the product"
    category:
      type: string
      enum: [SOFTWARE, HARDWARE, SERVICE, SUBSCRIPTION]
      description: "Product category"
    active:
      type: boolean
      description: "Whether the product is currently active"
    currency:
      type: ref
      target: Currency
      relation: ManyToOne
      description: "Currency for unit price"
    lineItems:
      type: ref
      target: LineItem
      relation: OneToMany
      mappedBy: product
      description: "Invoice line items referencing this product"
  permissions:
    Accountant: [create, read, update]
    Viewer: [read]
  policies:
    ActiveUserOnly: [create, update]
  hooks:
    ValidateProduct:
      phase: PRECOMMIT
      async: false
      onFailure: reject
      url: http://hook-service:8080/hooks/validate-product
    ProductChanged:
      phase: POSTCOMMIT
      async: true
      onFailure: warn
      url: http://hook-service:8080/hooks/product-changed
