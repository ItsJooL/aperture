apiVersion: aperture.itsjool.com/v1
kind: Entity
metadata:
  name: ServicePackage
spec:
  description: "A recurring or bundled service sold by the tenant"
  plural: ServicePackages
  tenantScoped: true
  fields:
    name:
      type: string
      required: true
      unique: true
      description: "Service package name"
    sku:
      type: string
      required: true
      unique: true
      description: "Service package SKU"
    description:
      type: string
      description: "Details of the service package"
    unit_price:
      type: decimal
      required: true
      description: "Package unit price"
    active:
      type: boolean
      description: "Whether the service package is currently active"
  permissions:
    Accountant: [create, read, update]
    Viewer: [read]
  policies:
    ActiveUserOnly: [create, update]
  hooks:
    ValidateServicePackage:
      type: validate
      on: [create, update]
      url: http://hook-service:8080/hooks/validate-service-package
