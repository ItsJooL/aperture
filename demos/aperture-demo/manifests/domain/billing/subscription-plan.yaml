apiVersion: aperture.itsjool.com/v1
kind: Entity
metadata:
  name: SubscriptionPlan
spec:
  description: "A recurring subscription sold at a fixed billing interval"
  plural: SubscriptionPlans
  tenantScoped: true
  fields:
    name:
      type: string
      required: true
      unique: true
      description: "Subscription plan name"
    sku:
      type: string
      required: true
      unique: true
      description: "Subscription plan SKU"
    description:
      type: string
      description: "Features and limits included in the plan"
    unit_price:
      type: decimal
      required: true
      description: "Price charged for each billing interval"
    billing_interval:
      type: string
      required: true
      enum: [MONTHLY, QUARTERLY, ANNUAL]
      description: "Cadence at which the plan renews"
    active:
      type: boolean
      description: "Whether the plan can be selected for new invoice lines"
  permissions:
    Accountant: [create, read, update]
    Viewer: [read]
  policies:
    ActiveUserOnly: [create, update]
  hooks:
    ValidateSubscriptionPlan:
      type: validate
      on: [create, update]
      url: http://hook-service:8080/hooks/validate-subscription-plan
