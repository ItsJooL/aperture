services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aperture
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aperture
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aperture"]
      interval: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/aperture-realm.json:/opt/keycloak/data/import/aperture-realm.json
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      retries: 12
      start_period: 60s

  api-server:
    build:
      context: ../../
      dockerfile: demos/aperture-keycloak-demo/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/aperture
      DB_USER: aperture
      DB_PASS: password
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/aperture/protocol/openid-connect/certs
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      retries: 10
      start_period: 60s

  seeder:
    build: ./seeder
    restart: on-failure
    environment:
      API_URL: http://api-server:8080
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: aperture
      KEYCLOAK_CLIENT_ID: aperture-api
      ADMIN_USERNAME: admin@keycloak-demo.com
      ADMIN_PASSWORD: Admin123!
    depends_on:
      api-server:
        condition: service_healthy
