apiVersion: aperture.itsjool.com/v1
kind: Entity
metadata:
  name: Task
spec:
  mcp:
    enabled: true
    tools: [list, get, create, update, delete]
  optimisticLocking: true
  softDelete: true
  fields:
    title:
      type: string
      required: true
    notes:
      type: string
    status:
      type: string
      enum: [TODO, DOING, DONE]
    project:
      type: ref
      target: Project
      relation: ManyToOne
      required: true
  permissions:
    Admin: [create, read, update, delete]
    Assistant: [create, read, update]
    ReadOnly: [read]
