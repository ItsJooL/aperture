elide:
  json-api:
    path: /api/
    enabled: true
  graphql:
    path: /graphql
    enabled: false
  api-versioning-strategy:
    path:
      enabled: true

spring:
  application:
    name: aperture-mcp-demo
  ai:
    mcp:
      server:
        protocol: STATELESS
        name: "Aperture MCP Server"
        version: "1.0"
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aperture}
    username: ${DB_USER:aperture}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

aperture:
  mcp:
    enabled: true
  auth:
    refresh-duration: ${APERTURE_REFRESH_DURATION:PT720H}
    jwt:
      secret: ${APERTURE_JWT_SECRET:mcp-demo-jwt-secret-change-me-32-bytes-min}
      issuer: ${APERTURE_JWT_ISSUER:aperture-mcp-demo}
      audience: ${APERTURE_JWT_AUDIENCE:aperture-mcp-demo-api}
      access-duration: ${APERTURE_JWT_ACCESS_DURATION:PT15M}
