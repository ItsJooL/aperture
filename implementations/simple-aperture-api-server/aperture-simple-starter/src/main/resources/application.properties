# ── TLS (optional) ────────────────────────────────────────────────────────────
# server.ssl.enabled=false
# server.ssl.certificate=                    # path to PEM certificate file
# server.ssl.certificate-private-key=       # path to PEM private key file
# server.ssl.key-store=                      # alternative: PKCS12 keystore path
# server.ssl.key-store-type=PKCS12
# server.ssl.key-store-password=
#
# aperture.server.https-only=false          # adds HSTS header to all responses when true
#
# Note: HTTP→HTTPS redirect requires a reverse proxy (nginx, traefik, ALB).
# Aperture does not provide a redirect connector.
